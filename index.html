<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Readability in musical programming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="lib/lab.js" data-labjs-script="library"></script>
  <script src="lib/lab.fallback.js" data-labjs-script="fallback"></script>
  <script  src="https://vlazzarini.github.io/litePlay.js/litePlay.constants.js"></script>
  <link rel="stylesheet" href="lib/lab.css">
</head>
<body>
    <header class="content-vertical-center content-horizontal-center">
      <div>
	      <h1>Readability in musical programming</h1>
	      <h2>Legibilidade em programação musical</h2>
      </div>
    </header>

    <main class="content-vertical-center content-horizontal-center" data-labjs-section="main">
  <div id="language-landing">
	<h2>Please choose your language/Por favor, escolha seu idioma</h2>
	<div style="display: flex; justify-content: center; align-items: center;">
      	<button onclick="launchStudy('study.js', 'English')">English</button>
      	<button onclick="launchStudy('study_pt.js', 'Portuguese')">Português</button>
	</div>
  </div>
	    <main class="container" data-labjs-section="main" id="labjs-canvas" style="display: none;">
	    </main>

  <script src="lib/lab.js"></script>

  <script>
    function launchStudy(scriptName, selectedLanguage) {
      window.chosenLanguage = selectedLanguage;
      document.getElementById('language-landing').style.display = 'none';
      document.getElementById('labjs-canvas').style.display = 'block';
      const studyScript = document.createElement('script');
      studyScript.src = scriptName;
      studyScript.charset = "utf-8";
      document.body.appendChild(studyScript);
    }
  </script>
    </main>
    <footer class="content-vertical-center content-horizontal-center">
      <div>
       <img src="https://www.maynoothuniversity.ie/sites/all/themes/nuim_themes/nuim/logo_old_2.png" width="50%" height="50%" alt="Maynooth University"> 
      </div>
    </footer>
</body>
</html>
